<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADESCO - Bienvenue</title>
    <style>
        /* Reset complet pour éviter les décalages sur mobile */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Animation du Logo */
        .splash-logo {
            width: 180px; /* Taille idéale smartphone */
            max-width: 60%;
            opacity: 0;
            transform: scale(0.7);
            animation: logoFadeIn 1.5s forwards ease-out;
        }

        @keyframes logoFadeIn {
            0% { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Barre de chargement moderne en bas */
        .loader-container {
            position: absolute;
            bottom: 80px;
            width: 120px;
            height: 4px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-bar {
            width: 100%;
            height: 100%;
            background: #0056b3; /* Bleu ADESCO */
            transform: translateX(-100%);
            animation: slideLoad 2.2s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideLoad {
            100% { transform: translateX(0); }
        }

        /* Texte indicatif discret */
        .loading-text {
            position: absolute;
            bottom: 55px;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
    <meta http-equiv="refresh" content="2.8;url=accueil.html">
</head>
<body>

    <img src="logo.png" alt="ADESCO Logo" class="splash-logo">
    
    <div class="loader-container">
        <div class="loader-bar"></div>
    </div>
    <div class="loading-text">Chargement...</div>

    <script>
        // Sécurité pour forcer la redirection même si le navigateur bloque le refresh meta
        setTimeout(function() {
            window.location.replace("accueil.html");
        }, 2800);
    </script>

</body>
</html>
