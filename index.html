<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADESCO - Chargement...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            overflow: hidden;
        }

        .splash-logo {
            width: 200px;
            opacity: 0;
            transform: scale(0.8);
            animation: fadeInScale 2s forwards ease-in-out;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Barre de chargement discrète */
        .loader {
            position: absolute;
            bottom: 50px;
            width: 150px;
            height: 3px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }
        .loader-bar {
            width: 100%;
            height: 100%;
            background: #0056b3;
            transform: translateX(-100%);
            animation: loading 2.5s forwards;
        }

        @keyframes loading {
            100% { transform: translateX(0); }
        }
    </style>
    <meta http-equiv="refresh" content="3;url=accueil.html">
</head>
<body>

    <img src="logo.png" alt="ADESCO Logo" class="splash-logo">
    
    <div class="loader">
        <div class="loader-bar"></div>
    </div>

    <script>
        // Sécurité si la balise meta ne marche pas sur certains mobiles
        setTimeout(() => {
            window.location.href = "accueil.html";
        }, 3000);
    </script>
</body>
</html>
