<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADESCO - Adhésion Officielle</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0056b3;
            --dark: #000000;
            --bg: #f4f7f6;
            --white: #ffffff;
            --success: #28a745;
            --error: #dc3545;
            --warning: #fff3cd;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--dark);
        }

        .navbar {
            background: var(--white);
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 2000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        
        .nav-container { width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { font-weight: 800; color: var(--primary); font-size: 1.1rem; }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }
        .nav-links a.active { color: var(--primary); }

        .main-container { padding: 110px 15px 40px; max-width: 550px; margin: 0 auto; }
        .form-card { background: var(--white); padding: 30px 20px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }

        .form-header { text-align: center; margin-bottom: 25px; }
        .form-header h1 { font-size: 1.6rem; text-transform: uppercase; color: var(--primary); font-weight: 900; }
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 0.85rem; color: #444; }
        
        input, select, textarea {
            width: 100%; padding: 13px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); outline: none; background: #f9fcff; }
        
        .error-input { border-color: var(--error) !important; background: #fff8f8 !important; }
        .error-text { color: var(--error); font-size: 0.75rem; font-weight: bold; margin-top: 5px; display: none; }

        .checkbox-group { background: #f8fafb; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-bottom: 8px; cursor: pointer; }
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); }

        .btn-container { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        .btn { padding: 16px; border: none; border-radius: 15px; cursor: pointer; font-weight: 800; font-size: 0.9rem; flex: 1; text-transform: uppercase; transition: 0.3s; }
        .btn-next { background: var(--primary); color: var(--white); }
        .btn-prev { background: #f0f0f0; color: #666; }
        .btn-submit { background: var(--success); color: var(--white); }

        #status-msg { margin-top: 20px; text-align: center; font-size: 0.95rem; font-weight: 800; border-radius: 10px; padding: 10px; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .form-card { padding: 25px 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">ADESCO KONGO CENTRAL</div>
            <ul class="nav-links">
                <li><a href="accueil.html">Accueil</a></li>
                <li><a href="adhesion.html" class="active">Adhésions</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <div class="form-card">
            <div class="form-header">
                <h1>Fiche d'Adhésion</h1>
                <p id="step-indicator" style="font-weight: 700; color: var(--primary);">Étape 1 sur 3</p>
            </div>

            <form id="adhesionForm">
                <div class="step active" id="step1">
                    <div class="input-group">
                        <label>Nom complet *</label>
                        <input type="text" name="nom_complet" placeholder="Ex: Jean Mukendi" required>
                        <span class="error-text">Veuillez remplir ce champ</span>
                    </div>
                    <div class="input-group">
                        <label>Date de naissance *</label>
                        <input type="date" name="date_naissance" required>
                        <span class="error-text">Veuillez indiquer votre date de naissance</span>
                    </div>
                    <div class="input-group">
                        <label>Nationalité *</label>
                        <input type="text" name="nationalite" value="Congolaise" required>
                    </div>
                    <div class="input-group">
                        <label>État Civil *</label>
                        <select name="statut_marital" required>
                            <option value="">Sélectionnez...</option>
                            <option value="Célibataire">Célibataire</option>
                            <option value="Marié(e)">Marié(e)</option>
                            <option value="Veuf(ve)">Veuf(ve)</option>
                            <option value="Divorcé(e)">Divorcé(e)</option>
                        </select>
                        <span class="error-text">Veuillez choisir une option</span>
                    </div>
                    <div class="input-group">
                        <label>Profession *</label>
                        <input type="text" name="profession" placeholder="Votre métier" required>
                        <span class="error-text">Veuillez remplir ce champ</span>
                    </div>
                    <button type="button" class="btn btn-next" onclick="validateAndNext(2)">Suivant <i class="fas fa-arrow-right"></i></button>
                </div>

                <div class="step" id="step2">
                    <div class="input-group">
                        <label>Adresse complète (Ville, Quartier, Rue) *</label>
                        <textarea name="adresse" rows="2" placeholder="Ex: Kinshasa, Limete, Rue 12" required></textarea>
                        <span class="error-text">L'adresse est requise</span>
                    </div>
                    <div class="input-group">
                        <label>Téléphone (WhatsApp) *</label>
                        <input type="tel" name="telephone" placeholder="Ex: +243..." required>
                        <span class="error-text">Numéro requis</span>
                    </div>
                    <div class="input-group">
                        <label>Motifs d'adhésion :</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Valeurs"> Partage des valeurs</label>
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Vie Politique"> Participation politique</label>
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Projets"> Projets de développement</label>
                            <input type="text" name="motif_autre" placeholder="Précisez ici si autre...">
                        </div>
                    </div>
                    <div class="btn-container">
                        <button type="button" class="btn btn-prev" onclick="goToStep(1)">Retour</button>
                        <button type="button" class="btn btn-next" onclick="validateAndNext(3)">Suivant</button>
                    </div>
                </div>

                <div class="step" id="step3">
                    <div class="input-group">
                        <label>Venant d'un autre parti ? *</label>
                        <select name="autre_parti" required>
                            <option value="Non">Non</option>
                            <option value="Oui">Oui</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Si oui, nom de l'ancien parti</label>
                        <input type="text" name="autre_parti_nom" placeholder="Nom du parti quitté">
                    </div>
                    <div class="input-group">
                        <label>Activités souhaitées au sein d'ADESCO :</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Mobilisation"> Mobilisation / Recrutement</label>
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Communication"> Communication / Parole</label>
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Logistique"> Gestion Événements</label>
                            <input type="text" name="activites_autre" placeholder="Autres activités souhaitées...">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Parrainage (Si applicable)</label>
                        <input type="text" name="parrain_nom" placeholder="Nom du parrain">
                        <input type="text" name="parrain_numero" placeholder="N° membre du parrain" style="margin-top:10px">
                    </div>
                    <div class="input-group" style="background:var(--warning); padding:15px; border-radius:15px;">
                        <label style="cursor:pointer; font-size: 0.85rem;">
                            <input type="checkbox" name="engagement_statuts" value="Oui" required> 
                            <b>Declaration:</b> Je jure sur mon honneur que ces infos sont vraies et m'engage à respecter les regles d'adesco.
                        </label>
                    </div>
                    <div class="btn-container">
                        <button type="button" class="btn btn-prev" onclick="goToStep(2)">Retour</button>
                        <button type="submit" class="btn btn-submit" id="submitBtn">Finaliser l'Adhésion</button>
                    </div>
                </div>
            </form>
            <div id="status-msg"></div>
        </div>
    </main>

    <script>
        function goToStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            document.getElementById('step-indicator').innerText = "Étape " + n + " sur 3";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function validateAndNext(next) {
            const currentStep = document.querySelector('.step.active');
            const inputs = currentStep.querySelectorAll('input[required], select[required], textarea[required]');
            let isValid = true;

            inputs.forEach(input => {
                if (!input.value.trim()) {
                    input.classList.add('error-input');
                    if(input.nextElementSibling) input.nextElementSibling.style.display = 'block';
                    isValid = false;
                } else {
                    input.classList.remove('error-input');
                    if(input.nextElementSibling && input.nextElementSibling.className === 'error-text') {
                        input.nextElementSibling.style.display = 'none';
                    }
                }
            });

            if (isValid) goToStep(next);
        }

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeF2_FigCylqCoPbsin4VPPkAn6DHcz8w5ToKkj0M13Jf_lYLSuGDS8IP9SKFRenEe5Q/exec";

        document.getElementById('adhesionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('status-msg');
            
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Traitement...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            data.motifs_selectionnes = Array.from(document.querySelectorAll('input[name="motifs"]:checked')).map(cb => cb.value).join(', ');
            data.activites_selectionnees = Array.from(document.querySelectorAll('input[name="activites"]:checked')).map(cb => cb.value).join(', ');

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
            .then(() => {
                msg.style.background = "#d4edda";
                msg.style.color = "var(--success)";
                msg.innerHTML = "✅ SUCCESS ! Votre adhésion a été enregistrée. Bienvenue chez ADESCO !";
                btn.innerText = "ADHÉSION RÉUSSIE";
                this.reset();
                setTimeout(() => location.reload(), 4000);
            })
            .catch(err => {
                msg.style.background = "#f8d7da";
                msg.style.color = "var(--error)";
                msg.innerText = "❌ Erreur. Vérifiez votre connexion.";
                btn.disabled = false;
                btn.innerText = "Réessayer";
            });
        });
    </script>
</body>
</html>
