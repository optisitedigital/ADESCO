<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADESCO - Adhésion</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0056b3;
            --dark: #000000;
            --bg: #f4f7f6;
            --white: #ffffff;
            --success: #28a745;
            --warning: #fff3cd;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--dark);
        }

        /* NAVBAR UNIFORMISÉE */
        .navbar {
            background: var(--white);
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 2000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        
        .nav-container { width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { font-weight: 800; color: var(--primary); font-size: 1.1rem; }
        .nav-links { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        .nav-links a.active { color: var(--primary); }
        .menu-toggle { display: none; cursor: pointer; z-index: 2100; }

        /* FORMULAIRE CONTAINER */
        .main-container { padding: 110px 15px 40px; max-width: 500px; margin: 0 auto; }
        .form-card { background: var(--white); padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }

        .form-header { text-align: center; margin-bottom: 25px; }
        .form-header h1 { font-size: 1.5rem; text-transform: uppercase; color: var(--primary); font-weight: 900; margin: 0; }
        .underline { width: 50px; height: 4px; background: var(--primary); margin: 10px auto; border-radius: 2px; }

        /* ÉTAPES */
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 0.9rem; color: #333; }
        
        input[type="text"], input[type="date"], input[type="tel"], select, textarea {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: #f0f7ff; }

        /* CHECKBOXES */
        .checkbox-group { display: flex; flex-direction: column; gap: 10px; background: #f8fafb; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; gap: 12px; font-size: 0.95rem; cursor: pointer; font-weight: 500; }
        .checkbox-item input { width: 19px; height: 19px; cursor: pointer; accent-color: var(--primary); }

        /* BOUTONS */
        .btn-container { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .btn { padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 0.9rem; flex: 1; transition: 0.3s; text-transform: uppercase; }
        .btn-next { background: var(--primary); color: var(--white); }
        .btn-prev { background: #eee; color: #666; }
        .btn-submit { background: var(--success); color: var(--white); }

        #status-msg { margin-top: 20px; text-align: center; font-size: 0.95rem; font-weight: bold; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links { position: fixed; top: 0; right: -100%; background: white; width: 75%; height: 100vh; flex-direction: column; justify-content: center; align-items: center; transition: 0.4s; box-shadow: -10px 0 30px rgba(0,0,0,0.1); gap: 25px; }
            .nav-links.active { right: 0; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">ADESCO KONGO CENTRAL</div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <ul class="nav-links" id="nav-list">
                <li><a href="accueil.html">Accueil</a></li>
                <li><a href="historique.html">Historique</a></li>
                <li><a href="actualites.html">Actualités</a></li>
                <li><a href="adhesion.html" class="active">Adhésions</a></li>
                <li><a href="apropos.html">À Propos</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <div class="form-card">
            <div class="form-header">
                <h1>Fiche d'Adhésion</h1>
                <div class="underline"></div>
            </div>

            <form id="adhesionForm">
                
                <div class="step active" id="step1">
                    <div class="input-group">
                        <label>Nom complet *</label>
                        <input type="text" name="nom_complet" placeholder="Votre nom" required>
                    </div>
                    <div class="input-group">
                        <label>Date de naissance *</label>
                        <input type="date" name="date_naissance" required>
                    </div>
                    <div class="input-group">
                        <label>Nationalité *</label>
                        <input type="text" name="nationalite" value="Congolaise" required>
                    </div>
                    <div class="input-group">
                        <label>Profession</label>
                        <input type="text" name="profession" placeholder="Votre métier">
                    </div>
                    <button type="button" class="btn btn-next" onclick="nextStep(2)">Suivant <i class="fas fa-arrow-right"></i></button>
                </div>

                <div class="step" id="step2">
                    <div class="input-group">
                        <label>Motif d'adhésion (Cochez) :</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Valeurs"> Partage des valeurs</label>
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Vie Politique"> Participation active</label>
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Projets"> Projets spécifiques</label>
                            <input type="text" name="motif_autre" placeholder="Autres motifs..." style="margin-top:5px">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Activités souhaitées :</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Campagnes"> Campagnes électorales</label>
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Parole"> Prises de parole</label>
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Evenements"> Gestion d'événements</label>
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Recrutement"> Recrutement</label>
                            <input type="text" name="activites_autre" placeholder="Précisez autres activités..." style="margin-top:5px">
                        </div>
                    </div>
                    <div class="btn-container">
                        <button type="button" class="btn btn-prev" onclick="nextStep(1)">Retour</button>
                        <button type="button" class="btn btn-next" onclick="nextStep(3)">Suivant</button>
                    </div>
                </div>

                <div class="step" id="step3">
                    <div class="input-group">
                        <label>Appartenance à un autre parti ?</label>
                        <select name="autre_parti">
                            <option value="Non">Non</option>
                            <option value="Oui">Oui</option>
                        </select>
                        <input type="text" name="autre_parti_nom" placeholder="Si oui, lequel ?" style="margin-top:10px">
                    </div>

                    <div class="input-group">
                        <label>Parrainage (Si applicable)</label>
                        <input type="text" name="parrain_nom" placeholder="Nom du parrain">
                        <input type="text" name="parrain_numero" placeholder="N° membre du parrain" style="margin-top:10px">
                    </div>

                    <div class="input-group" style="background:var(--warning); padding:15px; border-radius:12px; border:1px solid #ffeeba;">
                        <label style="color:#856404; font-size:0.85rem; font-weight:600; cursor:pointer;">
                            <input type="checkbox" required name="engagement_statuts" value="Oui" style="margin-right:10px;"> 
                            Je déclare sur l'honneur que les infos sont exactes et m'engage à respecter les statuts du parti ADESCO.
                        </label>
                    </div>

                    <div class="btn-container">
                        <button type="button" class="btn btn-prev" onclick="nextStep(2)">Retour</button>
                        <button type="submit" class="btn btn-submit" id="submitBtn">Finaliser l'Adhésion</button>
                    </div>
                </div>
            </form>
            <div id="status-msg"></div>
        </div>
    </main>

    <script>
        // NAVIGATION MOBILE
        const mobileMenu = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');
        mobileMenu.onclick = () => navList.classList.toggle('active');

        // ÉTAPES
        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // GOOGLE SHEETS ENVOI (Inchangé par rapport à ton original)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeF2_FigCylqCoPbsin4VPPkAn6DHcz8w5ToKkj0M13Jf_lYLSuGDS8IP9SKFRenEe5Q/exec";

        document.getElementById('adhesionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('status-msg');
            
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Envoi...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            // Collecte motifs cochés
            const motifs = [];
            document.querySelectorAll('input[name="motifs"]:checked').forEach(cb => motifs.push(cb.value));
            data.motifs_selectionnes = motifs.join(', ');

            // Collecte activités cochées
            const activites = [];
            document.querySelectorAll('input[name="activites"]:checked').forEach(cb => activites.push(cb.value));
            data.activites_selectionnees = activites.join(', ');

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
            .then(() => {
                msg.style.color = "var(--success)";
                msg.innerHTML = "✅ Merci ! Votre demande d'adhésion a été envoyée avec succès.";
                btn.innerText = "ENVOYÉ";
                this.reset();
                setTimeout(() => nextStep(1), 5000);
            })
            .catch(err => {
                msg.style.color = "#dc3545";
                msg.innerText = "❌ Erreur. Vérifiez votre connexion.";
                btn.disabled = false;
                btn.innerText = "Réessayer";
            });
        });
    </script>
</body>
</html>
