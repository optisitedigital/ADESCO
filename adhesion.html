<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADESCO - Adhésion</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-black: #000000;
            --adesco-blue: #0056b3;
            --bg-light: #f4f7f6;
            --success-green: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--primary-black);
        }

        .main-container {
            padding: 15px;
            max-width: 500px; /* Plus étroit pour un look pro sur mobile */
            margin: 0 auto;
        }

        .form-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .form-header { text-align: center; margin-bottom: 20px; }
        .form-header h1 { font-size: 1.3rem; text-transform: uppercase; border-bottom: 3px solid var(--adesco-blue); display: inline-block; padding-bottom: 5px; margin: 0;}

        /* SYSTÈME D'ÉTAPES */
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.85rem; color: #333; }
        
        /* CHAMPS TEXTE */
        .input-group input[type="text"], 
        .input-group input[type="date"], 
        .input-group input[type="tel"], 
        .input-group select, 
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        /* CASES À COCHER & RADIOS */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .checkbox-item input { width: 18px; height: 18px; cursor: pointer; }

        /* BOUTONS */
        .btn-container { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            flex: 1;
        }
        .btn-next { background: var(--adesco-blue); color: white; }
        .btn-prev { background: #e0e0e0; color: #444; }
        .btn-submit { background: var(--success-green); color: white; }

        #status-msg { margin-top: 15px; text-align: center; font-size: 0.85rem; font-weight: bold; }

        @media screen and (max-width: 480px) {
            .main-container { padding: 10px; }
            .form-card { padding: 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">ADESCO KC</div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="historique.html">Historique</a></li>
                <li><a href="actualites.html">Actualités</a></li>
                <li><a href="adhesion.html" class="active">Adhésions</a></li>
                <li><a href="apropos.html">À Propos</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <div class="form-card">
            <div class="form-header">
                <h1>Fiche d'Adhésion</h1>
            </div>

            <form id="adhesionForm">
                
                <div class="step active" id="step1">
                    <div class="input-group">
                        <label>Nom complet *</label>
                        <input type="text" name="nom_complet" placeholder="Votre nom" required>
                    </div>
                    <div class="input-group">
                        <label>Date de naissance *</label>
                        <input type="date" name="date_naissance" required>
                    </div>
                    <div class="input-group">
                        <label>Nationalité *</label>
                        <input type="text" name="nationalite" value="Congolaise" required>
                    </div>
                    <div class="input-group">
                        <label>Profession</label>
                        <input type="text" name="profession" placeholder="Votre métier">
                    </div>
                    <button type="button" class="btn btn-next" onclick="nextStep(2)">Suivant</button>
                </div>

                <div class="step" id="step2">
                    <div class="input-group">
                        <label>Motif d'adhésion (Cochez) :</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Valeurs"> Partage des valeurs</label>
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Vie Politique"> Participation active</label>
                            <label class="checkbox-item"><input type="checkbox" name="motifs" value="Projets"> Projets spécifiques</label>
                            <input type="text" name="motif_autre" placeholder="Autres motifs..." style="margin-top:5px">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Activités souhaitées :</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Campagnes"> Campagnes électorales</label>
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Parole"> Prises de parole</label>
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Evenements"> Gestion d'événements</label>
                            <label class="checkbox-item"><input type="checkbox" name="activites" value="Recrutement"> Recrutement</label>
                            <input type="text" name="activites_autre" placeholder="Précisez autres activités..." style="margin-top:5px">
                        </div>
                    </div>
                    <div class="btn-container">
                        <button type="button" class="btn btn-prev" onclick="nextStep(1)">Retour</button>
                        <button type="button" class="btn btn-next" onclick="nextStep(3)">Suivant</button>
                    </div>
                </div>

                <div class="step" id="step3">
                    <div class="input-group">
                        <label>Appartenance à un autre parti ?</label>
                        <select name="autre_parti">
                            <option value="Non">Non</option>
                            <option value="Oui">Oui</option>
                        </select>
                        <input type="text" name="autre_parti_nom" placeholder="Si oui, lequel ?" style="margin-top:5px">
                    </div>

                    <div class="input-group">
                        <label>Parrainage (Si applicable)</label>
                        <input type="text" name="parrain_nom" placeholder="Nom du parrain">
                        <input type="text" name="parrain_numero" placeholder="N° membre du parrain" style="margin-top:5px">
                    </div>

                    <div class="input-group" style="background:#fff3cd; padding:10px; border-radius:8px; border:1px solid #ffeeba;">
                        <label style="color:#856404; font-size:0.75rem;">
                            <input type="checkbox" required name="engagement_statuts" value="Oui"> 
                            Je déclare sur l'honneur que les infos sont exactes et m'engage à respecter les statuts du parti ADESCO.
                        </label>
                    </div>

                    <div class="btn-container">
                        <button type="button" class="btn btn-prev" onclick="nextStep(2)">Retour</button>
                        <button type="submit" class="btn btn-submit" id="submitBtn">Finaliser l'Adhésion</button>
                    </div>
                </div>

            </form>
            <div id="status-msg"></div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeF2_FigCylqCoPbsin4VPPkAn6DHcz8w5ToKkj0M13Jf_lYLSuGDS8IP9SKFRenEe5Q/exec";

        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            window.scrollTo(0,0);
        }

        document.getElementById('adhesionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('status-msg');
            
            btn.disabled = true;
            btn.innerText = "Traitement...";

            // Récupération des données
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            // Gestion des cases à cocher multiples (Motifs et Activités)
            const motifs = [];
            document.querySelectorAll('input[name="motifs"]:checked').forEach(cb => motifs.push(cb.value));
            data.motifs_selectionnes = motifs.join(', ');

            const activites = [];
            document.querySelectorAll('input[name="activites"]:checked').forEach(cb => activites.push(cb.value));
            data.activites_selectionnees = activites.join(', ');

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            })
            .then(() => {
                msg.style.color = "green";
                msg.innerHTML = "✅ Adhésion envoyée avec succès !";
                btn.innerText = "Envoyé";
                this.reset();
            })
            .catch(err => {
                msg.style.color = "red";
                msg.innerText = "Erreur. Vérifiez votre connexion.";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
