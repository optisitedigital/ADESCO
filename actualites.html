<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADESCO - Actualités</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0056b3;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --gold: #d4af37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 0;
            color: var(--dark);
        }

        /* --- NAVBAR --- */
        .navbar {
            background: #fff;
            height: 70px;
            display: flex;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 2000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        
        .nav-container { 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px;
        }
        
        .nav-brand { font-weight: 800; color: var(--primary); font-size: 0.9rem; }
        
        .nav-links { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { 
            text-decoration: none; 
            color: var(--dark); 
            font-weight: 700; 
            font-size: 0.85rem; 
            text-transform: uppercase;
        }
        .nav-links a.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .menu-toggle { display: none; cursor: pointer; font-size: 1.5rem; color: var(--primary); }

        /* --- CONTENU --- */
        .main-content {
            padding: 120px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .section-header h1 { 
            font-size: 1.8rem; 
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .underline {
            width: 50px; height: 4px; background: var(--gold); margin: 0 auto 40px;
        }

        /* --- GRILLE D'ACTUALITÉS --- */
        .news-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 10px;
        }

        .news-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            text-align: left;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .news-card:hover { transform: translateY(-8px); }

        .news-image-box {
            width: 100%;
            height: 200px;
            background: #eee;
        }

        .news-image-box img { width: 100%; height: 100%; object-fit: cover; }

        .news-body { padding: 20px; }

        .news-date {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        .news-title {
            font-size: 1.15rem;
            margin: 0 0 12px 0;
            font-weight: 800;
            line-height: 1.3;
        }

        .news-desc {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* --- ETATS --- */
        #loader { padding: 50px; color: var(--primary); font-size: 2.5rem; }
        #empty-msg { display: none; padding: 50px; color: #888; font-style: italic; }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links {
                position: fixed; top: 70px; right: -100%; width: 100%; height: 100vh;
                background: #fff; flex-direction: column; align-items: center; padding-top: 50px;
                transition: 0.4s; z-index: 1999;
            }
            .nav-links.active { right: 0; }
            .nav-links li { margin: 15px 0; }
            .news-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">ADESCO KONGO CENTRAL</div>
            <div class="menu-toggle" id="mobile-toggle"><i class="fas fa-bars"></i></div>
            <ul class="nav-links" id="nav-list">
                <li><a href="accueil.html">Accueil</a></li>
                <li><a href="historique.html">Historique</a></li>
                <li><a href="actualites.html" class="active">Actualités</a></li>
                <li><a href="adhesion.html">Adhésions</a></li>
                <li><a href="apropos.html">À Propos</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="section-header">
            <h1>Dernières Actualités</h1>
            <div class="underline"></div>
        </div>

        <div id="loader"><i class="fas fa-circle-notch fa-spin"></i></div>
        <div id="empty-msg">Aucune actualité n'est disponible pour le moment.</div>
        <div class="news-container" id="newsContainer"></div>
    </main>

    <script>
        // NAVIGATION MOBILE
        const toggle = document.getElementById('mobile-toggle');
        const nav = document.getElementById('nav-list');
        
        toggle.addEventListener('click', () => {
            nav.classList.toggle('active');
            const icon = toggle.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // RÉCUPÉRATION CSV (GOOGLE SHEETS)
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDFMpVR6xyqvk6JTYAbIuCEMSVQLceZUoztTvFEymZsQWxhh-GDsMd74BpdVdyvi2FGOSuZfnH1Pc7/pub?output=csv";

        async function fetchNews() {
            const container = document.getElementById('newsContainer');
            const loader = document.getElementById('loader');
            const emptyMsg = document.getElementById('empty-msg');

            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // On saute l'entête

                if (rows.length === 0 || (rows.length === 1 && rows[0].trim() === "")) {
                    loader.style.display = 'none';
                    emptyMsg.style.display = 'block';
                    return;
                }

                container.innerHTML = "";

                rows.forEach(row => {
                    // Regex pour bien séparer les virgules même s'il y en a dans le texte entre guillemets
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) return;

                    const [titre, date, desc, photo] = cols.map(c => c.replace(/^"|"$/g, '').trim());

                    const card = `
                        <article class="news-card">
                            <div class="news-image-box">
                                <img src="${photo}" alt="${titre}" onerror="this.src='https://via.placeholder.com/400x250?text=ADESCO+KC'">
                            </div>
                            <div class="news-body">
                                <span class="news-date"><i class="far fa-calendar-alt"></i> ${date}</span>
                                <h3 class="news-title">${titre}</h3>
                                <p class="news-desc">${desc}</p>
                            </div>
                        </article>
                    `;
                    container.innerHTML += card;
                });

                loader.style.display = 'none';

            } catch (error) {
                console.error("Erreur:", error);
                loader.innerHTML = "<p style='color:red;'>Impossible de charger les actualités.</p>";
            }
        }

        window.onload = fetchNews;
    </script>
</body>
</html>
