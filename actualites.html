<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADESCO - Actualités</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0056b3;
            --dark: #1a1a1a;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
        }

        .main-content {
            padding: 40px 20px;
            max-width: 1300px;
            margin: 60px auto 0;
            text-align: center;
        }

        .section-header h1 { 
            font-size: 2.5rem; 
            color: var(--dark);
            margin-bottom: 10px;
        }

        .underline {
            width: 60px; height: 4px; background: var(--primary); margin: 0 auto 40px;
        }

        /* CAROUSEL CONTENEUR */
        .news-wrapper {
            position: relative;
            overflow: hidden;
            padding: 20px 0;
        }

        .news-container {
            display: flex;
            gap: 25px;
            padding: 10px;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            width: max-content;
        }

        /* CARTES D'ACTUALITÉS */
        .news-card {
            width: 350px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: left;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .news-card:hover { transform: translateY(-10px); }

        .news-image-box {
            width: 100%;
            height: 220px;
            background: #ddd;
        }

        .news-image-box img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .news-body { padding: 25px; }

        .news-date {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
        }

        .news-title {
            font-size: 1.25rem;
            color: var(--dark);
            margin: 0 0 15px 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
            height: 75px;
            overflow-y: auto;
        }

        /* MESSAGE VIDE */
        #empty-msg { font-style: italic; color: #999; padding: 50px; display: none; }
        
        #loader { padding: 100px; color: var(--primary); font-size: 2rem; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .news-card { width: 280px; }
            .section-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">ADESCO KC</div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="historique.html">Historique</a></li>
                <li><a href="actualites.html" class="active">Actualités</a></li>
                <li><a href="adhesion.html">Adhésions</a></li>
                <li><a href="apropos.html">À Propos</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="section-header">
            <h1>Dernières Actualités</h1>
            <div class="underline"></div>
        </div>

        <div id="loader"><i class="fas fa-circle-notch fa-spin"></i></div>
        <div id="empty-msg">Aucune actualité n'est disponible pour le moment.</div>

        <div class="news-wrapper" id="carouselWrapper" style="display:none;">
            <div class="news-container" id="newsContainer">
                </div>
        </div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDFMpVR6xyqvk6JTYAbIuCEMSVQLceZUoztTvFEymZsQWxhh-GDsMd74BpdVdyvi2FGOSuZfnH1Pc7/pub?output=csv";
        
        const container = document.getElementById('newsContainer');
        const wrapper = document.getElementById('carouselWrapper');
        const loader = document.getElementById('loader');
        const emptyMsg = document.getElementById('empty-msg');

        let isPaused = false;
        let scrollPos = 0;

        async function loadNews() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                
                // Conversion du CSV en tableau d'objets
                const rows = data.split('\n').slice(1); // On enlève l'entête
                
                if (rows.length === 0 || (rows.length === 1 && rows[0].trim() === "")) {
                    loader.style.display = 'none';
                    emptyMsg.style.display = 'block';
                    return;
                }

                container.innerHTML = "";

                rows.forEach(row => {
                    // Nettoyage des colonnes (gestion des virgules dans le texte)
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) return;

                    const [titre, date, desc, photo] = cols.map(c => c.replace(/^"|"$/g, '').trim());

                    const card = `
                        <div class="news-card" onmouseenter="isPaused=true" onmouseleave="isPaused=false" ontouchstart="isPaused=true">
                            <div class="news-image-box">
                                <img src="${photo}" alt="ADESCO Actu" onerror="this.src='https://via.placeholder.com/400x250?text=ADESCO'">
                            </div>
                            <div class="news-body">
                                <span class="news-date"><i class="far fa-calendar-alt"></i> ${date}</span>
                                <h3 class="news-title">${titre}</h3>
                                <div class="news-desc">${desc}</div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                // On double les éléments pour un scroll infini propre si besoin
                if (rows.length > 3) {
                    container.innerHTML += container.innerHTML;
                }

                loader.style.display = 'none';
                wrapper.style.display = 'block';
                startAutoScroll();

            } catch (e) {
                console.error(e);
                loader.innerHTML = "Erreur de connexion aux données.";
            }
        }

        function startAutoScroll() {
            const speed = 1; // Vitesse
            function animate() {
                if (!isPaused) {
                    scrollPos += speed;
                    if (scrollPos >= container.scrollWidth / 2) {
                        scrollPos = 0; // Reset discret
                    }
                    container.style.transform = `translateX(-${scrollPos}px)`;
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = loadNews;
    </script>
</body>
</html>
