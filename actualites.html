<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADESCO - Actualités</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0056b3;
            --dark: #1a1a1a;
            --light: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 0;
            color: var(--dark);
            overflow-x: hidden;
        }

        /* NAVBAR UNIFORMISÉE */
        .navbar {
            background: var(--white);
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 2000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        
        .nav-container { 
            width: 90%; 
            max-width: 1200px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .nav-brand { font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        
        .nav-links { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        
        .nav-links a { 
            text-decoration: none; 
            color: var(--dark); 
            font-weight: 700; 
            font-size: 0.85rem; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        
        .nav-links a.active { color: var(--primary); }

        .menu-toggle { display: none; cursor: pointer; z-index: 2100; }

        /* CONTENU PRINCIPAL */
        .main-content {
            padding: 110px 15px 40px;
            max-width: 1300px;
            margin: 0 auto;
            text-align: center;
        }

        .section-header h1 { 
            font-size: 2rem; 
            color: var(--dark);
            margin-bottom: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .underline {
            width: 60px; height: 4px; background: var(--primary); margin: 0 auto 40px;
            border-radius: 2px;
        }

        /* GRILLE / CONTENEUR DE SCROLL */
        .news-container {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 20px 10px;
            scrollbar-width: none; /* Cache la barre sur Firefox */
            -webkit-overflow-scrolling: touch;
        }

        .news-container::-webkit-scrollbar { display: none; } /* Cache la barre sur Chrome */

        /* CARTES D'ACTUALITÉS */
        .news-card {
            min-width: 320px;
            max-width: 380px;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: left;
            flex-shrink: 0;
            scroll-snap-align: center;
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .news-card:hover { transform: translateY(-5px); }

        .news-image-box {
            width: 100%;
            height: 220px;
            background: #eee;
            overflow: hidden;
        }

        .news-image-box img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .news-body { padding: 25px; flex-grow: 1; }

        .news-date {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 800;
            display: block;
            margin-bottom: 10px;
        }

        .news-title {
            font-size: 1.25rem;
            color: var(--dark);
            margin: 0 0 15px 0;
            line-height: 1.3;
            font-weight: 800;
        }

        .news-desc {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #empty-msg { display: none; padding: 50px; color: #888; font-style: italic; }
        #loader { padding: 100px; color: var(--primary); font-size: 3rem; }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                background: white;
                width: 75%;
                height: 100vh;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: -10px 0 30px rgba(0,0,0,0.1);
                z-index: 2050;
                gap: 25px;
            }

            .nav-links.active { right: 0; }
            .nav-links a { font-size: 1.1rem; }

            .news-card {
                min-width: 85vw; /* Très important pour l'effet mobile */
            }
            .section-header h1 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">ADESCO KONGO CENTRAL</div>
            
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars" id="menu-icon" style="font-size: 1.6rem; color: var(--primary);"></i>
            </div>

            <ul class="nav-links" id="nav-list">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="historique.html">Historique</a></li>
                <li><a href="actualites.html" class="active">Actualités</a></li>
                <li><a href="adhesion.html">Adhésions</a></li>
                <li><a href="apropos.html">À Propos</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="section-header">
            <h1>Dernières Actualités</h1>
            <div class="underline"></div>
        </div>

        <div id="loader"><i class="fas fa-circle-notch fa-spin"></i></div>
        <div id="empty-msg">Aucune actualité n'est disponible pour le moment.</div>

        <div class="news-container" id="newsContainer">
            </div>
    </main>

    <script>
        // LOGIQUE NAVIGATION MOBILE
        const mobileMenu = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');
        const menuIcon = document.getElementById('menu-icon');

        mobileMenu.onclick = function(e) {
            e.stopPropagation();
            navList.classList.toggle('active');
            if(navList.classList.contains('active')) {
                menuIcon.classList.replace('fa-bars', 'fa-times');
            } else {
                menuIcon.classList.replace('fa-times', 'fa-bars');
            }
        };

        // Fermeture au clic extérieur
        document.onclick = function(e) {
            if (!mobileMenu.contains(e.target) && !navList.contains(e.target)) {
                navList.classList.remove('active');
                menuIcon.classList.replace('fa-times', 'fa-bars');
            }
        };

        // RECUPERATION DES DONNÉES CSV
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDFMpVR6xyqvk6JTYAbIuCEMSVQLceZUoztTvFEymZsQWxhh-GDsMd74BpdVdyvi2FGOSuZfnH1Pc7/pub?output=csv";

        async function fetchNews() {
            const container = document.getElementById('newsContainer');
            const loader = document.getElementById('loader');
            const emptyMsg = document.getElementById('empty-msg');

            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                // On sépare par ligne et on retire l'entête
                const rows = data.split('\n').slice(1);

                if (rows.length === 0 || (rows.length === 1 && rows[0].trim() === "")) {
                    loader.style.display = 'none';
                    emptyMsg.style.display = 'block';
                    return;
                }

                container.innerHTML = "";

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) return;

                    const [titre, date, desc, photo] = cols.map(c => c.replace(/^"|"$/g, '').trim());

                    const card = `
                        <article class="news-card">
                            <div class="news-image-box">
                                <img src="${photo}" alt="${titre}" onerror="this.src='https://via.placeholder.com/400x250?text=ADESCO+KC'">
                            </div>
                            <div class="news-body">
                                <span class="news-date"><i class="far fa-calendar-alt"></i> ${date}</span>
                                <h3 class="news-title">${titre}</h3>
                                <p class="news-desc">${desc}</p>
                            </div>
                        </article>
                    `;
                    container.innerHTML += card;
                });

                loader.style.display = 'none';

            } catch (error) {
                console.error("Erreur:", error);
                loader.innerHTML = "<p style='color:red;'>Erreur de connexion aux actualités.</p>";
            }
        }

        window.onload = fetchNews;
    </script>
</body>
</html>
