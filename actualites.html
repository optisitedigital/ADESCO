<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADESCO - Actualités</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0056b3;
            --dark: #1a1a1a;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--light);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .main-content {
            padding: 40px 15px;
            max-width: 1300px;
            margin: 80px auto 0;
            text-align: center;
        }

        .section-header h1 { 
            font-size: 2.2rem; 
            color: var(--dark);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .underline {
            width: 50px; height: 4px; background: var(--primary); margin: 0 auto 40px;
            border-radius: 2px;
        }

        /* GRILLE / CONTENEUR DE SCROLL MANUEL */
        .news-container {
            display: flex;
            gap: 20px;
            overflow-x: auto; /* Permet le scroll horizontal */
            scroll-snap-type: x mandatory; /* Aligne les cartes proprement */
            padding: 20px 5px;
            scrollbar-width: thin; /* Pour Firefox */
            scrollbar-color: var(--primary) transparent;
            -webkit-overflow-scrolling: touch; /* Scroll fluide sur iOS */
        }

        /* Personnalisation barre de défilement pour Chrome/Edge */
        .news-container::-webkit-scrollbar {
            height: 6px;
        }
        .news-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        /* CARTES D'ACTUALITÉS */
        .news-card {
            min-width: 320px; /* Taille sur PC */
            max-width: 350px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: left;
            flex-shrink: 0;
            scroll-snap-align: start;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .news-image-box {
            width: 100%;
            height: 200px;
            background: #eee;
        }

        .news-image-box img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .news-body { padding: 20px; flex-grow: 1; }

        .news-date {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
        }

        .news-title {
            font-size: 1.15rem;
            color: var(--dark);
            margin: 0 0 12px 0;
            line-height: 1.4;
            font-weight: 700;
        }

        .news-desc {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 4; /* Coupe le texte après 4 lignes */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ÉTATS VIDE ET CHARGEMENT */
        #empty-msg { display: none; padding: 50px; color: #888; font-style: italic; }
        #loader { padding: 80px; color: var(--primary); font-size: 2.5rem; }

        /* RESPONSIVE MOBILE */
        @media (max-width: 600px) {
            .news-card {
                min-width: 85vw; /* Presque toute la largeur sur mobile */
            }
            .section-header h1 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">ADESCO KC</div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="historique.html">Historique</a></li>
                <li><a href="actualites.html" class="active">Actualités</a></li>
                <li><a href="adhesion.html">Adhésions</a></li>
                <li><a href="apropos.html">À Propos</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="section-header">
            <h1>Dernières Actualités</h1>
            <div class="underline"></div>
        </div>

        <div id="loader"><i class="fas fa-spinner fa-spin"></i></div>
        <div id="empty-msg">Aucune actualité disponible pour le moment.</div>

        <div class="news-container" id="newsContainer">
            </div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDFMpVR6xyqvk6JTYAbIuCEMSVQLceZUoztTvFEymZsQWxhh-GDsMd74BpdVdyvi2FGOSuZfnH1Pc7/pub?output=csv";

        async function fetchNews() {
            const container = document.getElementById('newsContainer');
            const loader = document.getElementById('loader');
            const emptyMsg = document.getElementById('empty-msg');

            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);

                if (rows.length === 0 || (rows.length === 1 && rows[0].trim() === "")) {
                    loader.style.display = 'none';
                    emptyMsg.style.display = 'block';
                    return;
                }

                container.innerHTML = "";

                rows.forEach(row => {
                    // Regex pour gérer les virgules à l'intérieur des guillemets dans le CSV
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) return;

                    const [titre, date, desc, photo] = cols.map(c => c.replace(/^"|"$/g, '').trim());

                    const card = `
                        <article class="news-card">
                            <div class="news-image-box">
                                <img src="${photo}" alt="Image Actu" onerror="this.src='https://via.placeholder.com/400x250?text=ADESCO+KC'">
                            </div>
                            <div class="news-body">
                                <span class="news-date"><i class="far fa-calendar-alt"></i> ${date}</span>
                                <h3 class="news-title">${titre}</h3>
                                <p class="news-desc">${desc}</p>
                            </div>
                        </article>
                    `;
                    container.innerHTML += card;
                });

                loader.style.display = 'none';

            } catch (error) {
                console.error("Erreur:", error);
                loader.innerHTML = "Erreur de chargement.";
            }
        }

        window.onload = fetchNews;
    </script>
</body>
</html>
